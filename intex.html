<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Recolector PRO MAX</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      color: white;
      text-align: center;
      overflow: hidden;
      transition: background 0.5s;
      background: #000;
    }

    h1 {
      margin-top: 10px;
    }

    #distancia {
      font-size: 22px;
    }

    .escena {
      position: relative;
      width: 100%;
      height: 300px;
      margin-top: 30px;
    }

    .basura {
      position: absolute;
      right: 120px;
      bottom: 50px;
      font-size: 50px;
      transition: 0.3s;
    }

    .camion {
      position: absolute;
      bottom: 50px;
      left: 50px;
      font-size: 70px;
      transition: left 0.3s ease-out;
      transform: scaleX(-1); /* 🔥 corregido */
    }

    #estado {
      font-size: 28px;
      margin-top: 20px;
      font-weight: bold;
    }

  </style>
</head>

<body>

  <h1>🚛 Recolector Inteligente PRO</h1>
  <div id="distancia">Cargando...</div>

  <div class="escena">
    <div id="camion" class="camion">🚛</div>
    <div id="basura" class="basura">🗑️</div>
  </div>

  <div id="estado">...</div>

  <audio id="sonido" src="https://www.soundjay.com/button/beep-07.wav"></audio>

  <script>
    const token = "d5d327b5-b402-4f2e-8fd3-f08d67986b2f";

    function actualizar() {
      fetch("https://api.tago.io/data?variable=distancia", {
        headers: {
          "Device-Token": token
        }
      })
      .then(res => res.json())
      .then(data => {
        let d = data.result[0].value;

        document.getElementById("distancia").innerHTML =
          "Distancia: " + d + " cm";

        let camion = document.getElementById("camion");
        let basura = document.getElementById("basura");
        let estado = document.getElementById("estado");
        let sonido = document.getElementById("sonido");

        // 🚛 movimiento suave
        let pos = 50 + (300 - d * 5);
        if (pos > 500) pos = 500;
        if (pos < 50) pos = 50;
        camion.style.left = pos + "px";

        // 🌈 LUZ EN TODA LA PANTALLA
        if (d > 30) {
          document.body.style.background = "#001a00"; // verde oscuro
          estado.innerHTML = "🟢 Buscando basura...";
          basura.style.opacity = 1;
        } 
        else if (d > 15) {
          document.body.style.background = "#332900"; // amarillo oscuro
          estado.innerHTML = "🟡 Acercándose...";
        } 
        else {
          document.body.style.background = "#330000"; // rojo oscuro
          estado.innerHTML = "🚨 ¡Recolectando!";
          basura.style.opacity = 0;
          sonido.play();
        }

      })
      .catch(err => console.log(err));
    }

    setInterval(actualizar, 700);
  </script>

</body>
</html>
