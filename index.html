<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trailer Inteligente</title>

<style>
body {
  margin: 0;
  background: #87ceeb;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
}

/* Calle */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #333;
}

/* Línea */
.linea {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 5px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
}

/* Trailer */
.trailer {
  position: absolute;
  bottom: 120px;
  left: 50px;
  display: flex;
  align-items: center;
  transition: left 0.3s linear;
}

/* Cabina */
.cabina {
  width: 60px;
  height: 50px;
  background: red;
  border-radius: 5px;
}

/* Caja */
.caja {
  width: 140px;
  height: 70px;
  background: white;
  border: 3px solid #ccc;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}

/* Ruedas */
.rueda {
  width: 25px;
  height: 25px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: -15px;
}

.r1 { left: 20px; }
.r2 { left: 100px; }
.r3 { left: 160px; }

/* Animación ruedas */
@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.girando {
  animation: girar 0.3s linear infinite;
}

/* Texto */
#distancia {
  margin-top: 20px;
  font-size: 22px;
}

</style>
</head>

<body>

<h1>🚚 Trailer Inteligente</h1>
<div id="distancia">Cargando...</div>

<div class="trailer" id="trailer">
  <div class="cabina"></div>
  <div class="caja">TUTI</div>

  <div class="rueda r1" id="r1"></div>
  <div class="rueda r2" id="r2"></div>
  <div class="rueda r3" id="r3"></div>
</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

const token = "d5d327b5-b402-4f2e-8fd3-f08d67986b2f";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let trailer = document.getElementById("trailer");

    let pos = 50 + (300 - d * 5);
    if (pos > 700) pos = 700;
    if (pos < 50) pos = 50;

    trailer.style.left = pos + "px";

    // ruedas girando
    document.getElementById("r1").classList.add("girando");
    document.getElementById("r2").classList.add("girando");
    document.getElementById("r3").classList.add("girando");

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
