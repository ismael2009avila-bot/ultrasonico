<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trailer PRO</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  text-align: center;
  transition: 0.5s;
  background: #87ceeb;
}

/* 🌆 Calle */
.calle {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 120px;
  background: #333;
}

.linea {
  position: absolute;
  bottom: 60px;
  width: 100%;
  height: 5px;
  background: repeating-linear-gradient(
    to right,
    white 0px,
    white 40px,
    transparent 40px,
    transparent 80px
  );
}

/* 🚚 Trailer */
.trailer {
  position: absolute;
  bottom: 120px;
  left: 50px;
  display: flex;
  align-items: center;
  transition: left 0.3s linear;
}

/* Cabina */
.cabina {
  width: 60px;
  height: 50px;
  background: red;
}

/* Caja */
.caja {
  width: 160px;
  height: 70px;
  background: white;
  border: 3px solid #ccc;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
  font-size: 20px;
}

/* 🛞 Ruedas */
.rueda {
  width: 25px;
  height: 25px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: -15px;
}

.r1 { left: 20px; }
.r2 { left: 110px; }
.r3 { left: 180px; }

@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.girando {
  animation: girar 0.3s linear infinite;
}

/* 💡 Luces */
.luz {
  width: 10px;
  height: 10px;
  background: yellow;
  position: absolute;
  left: -10px;
  top: 15px;
  border-radius: 50%;
  box-shadow: 0 0 10px yellow;
}

.freno {
  width: 10px;
  height: 10px;
  background: red;
  position: absolute;
  right: -10px;
  top: 20px;
  border-radius: 50%;
  box-shadow: 0 0 10px red;
  opacity: 0;
}

#distancia {
  margin-top: 20px;
  font-size: 22px;
}

#estado {
  font-size: 24px;
  margin-top: 10px;
}

</style>
</head>

<body>

<h1>🚚 Trailer Inteligente PRO</h1>
<div id="distancia">Cargando...</div>
<div id="estado"></div>

<div class="trailer" id="trailer">

  <div class="cabina">
    <div class="luz"></div>
  </div>

  <div class="caja">TUTI</div>

  <div class="freno" id="freno"></div>

  <div class="rueda r1" id="r1"></div>
  <div class="rueda r2" id="r2"></div>
  <div class="rueda r3" id="r3"></div>

</div>

<div class="calle"></div>
<div class="linea"></div>

<script>

const token = "d5d327b5-b402-4f2e-8fd3-f08d67986b2f";

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let trailer = document.getElementById("trailer");
    let estado = document.getElementById("estado");
    let freno = document.getElementById("freno");

    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");
    let r3 = document.getElementById("r3");

    let pos = 50 + (300 - d * 5);
    if (pos > 700) pos = 700;
    if (pos < 50) pos = 50;

    trailer.style.left = pos + "px";

    // 🛞 ruedas
    r1.classList.add("girando");
    r2.classList.add("girando");
    r3.classList.add("girando");

    // 🌙 MODO NOCHE
    if (d < 20) {
      document.body.style.background = "#0b1a2a";
    } else {
      document.body.style.background = "#87ceeb";
    }

    // 🚨 FRENO
    if (d < 15) {
      estado.innerHTML = "🚨 FRENANDO";
      freno.style.opacity = 1;

      // detener ruedas
      r1.classList.remove("girando");
      r2.classList.remove("girando");
      r3.classList.remove("girando");
    } 
    else if (d < 30) {
      estado.innerHTML = "⚠️ Acercándose";
      freno.style.opacity = 0;
    } 
    else {
      estado.innerHTML = "🟢 Avanzando";
      freno.style.opacity = 0;
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
