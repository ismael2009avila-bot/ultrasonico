<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Recolector PRO MAX</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;
  overflow: hidden;
  transition: background 0.5s;
  background: url('https://i.imgur.com/8IuucQZ.jpg') no-repeat center center fixed;
  background-size: cover;
}

h1 { margin-top: 10px; }

#distancia { font-size: 22px; }

.escena {
  position: relative;
  width: 100%;
  height: 300px;
  margin-top: 30px;
}

/* 🗑️ Basura */
.basura {
  position: absolute;
  right: 150px;
  bottom: 70px;
  font-size: 50px;
  transition: opacity 0.3s;
}

/* 🚛 Camión */
.camion {
  position: absolute;
  bottom: 60px;
  left: 50px;
  width: 120px;
  height: 60px;
  transition: left 0.3s linear;
}

/* Cuerpo */
.cuerpo {
  width: 100%;
  height: 40px;
  background: #e53935;
  border-radius: 10px;
}

/* Cabina */
.cabina {
  width: 40px;
  height: 30px;
  background: #ff7043;
  position: absolute;
  top: -30px;
  right: 0;
  border-radius: 5px;
}

/* Ruedas */
.rueda {
  width: 25px;
  height: 25px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: -10px;
}

/* Posición ruedas */
.rueda1 { left: 15px; }
.rueda2 { right: 15px; }

/* Animación ruedas */
@keyframes girar {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.girando {
  animation: girar 0.3s linear infinite;
}

#estado {
  font-size: 26px;
  margin-top: 20px;
  font-weight: bold;
}

</style>
</head>

<body>

<h1>🚛 Recolector Inteligente PRO</h1>
<div id="distancia">Cargando...</div>

<div class="escena">

  <div id="camion" class="camion">
    <div class="cuerpo"></div>
    <div class="cabina"></div>
    <div class="rueda rueda1" id="r1"></div>
    <div class="rueda rueda2" id="r2"></div>
  </div>

  <div id="basura" class="basura">🗑️</div>

</div>

<div id="estado">...</div>

<audio id="sonido" src="https://www.soundjay.com/button/beep-07.wav"></audio>

<script>

const token = "d5d327b5-b402-4f2e-8fd3-f08d67986b2f";

let recogido = false;

function actualizar() {

  fetch("https://api.tago.io/data?variable=distancia", {
    headers: { "Device-Token": token }
  })
  .then(res => res.json())
  .then(data => {

    let d = data.result[0].value;

    document.getElementById("distancia").innerHTML =
      "Distancia: " + d + " cm";

    let camion = document.getElementById("camion");
    let basura = document.getElementById("basura");
    let estado = document.getElementById("estado");
    let sonido = document.getElementById("sonido");

    let r1 = document.getElementById("r1");
    let r2 = document.getElementById("r2");

    // 🚛 Movimiento real
    let pos = 50 + (300 - d * 5);
    if (pos > 600) pos = 600;
    if (pos < 50) pos = 50;

    camion.style.left = pos + "px";

    // 🛞 Ruedas giran cuando se mueve
    r1.classList.add("girando");
    r2.classList.add("girando");

    // 🧠 Lógica CORREGIDA
    if (d > 30) {
      document.body.style.filter = "brightness(1)";
      estado.innerHTML = "🟢 Buscando basura...";
      basura.style.opacity = 1;
      recogido = false;
    }
    else if (d > 15) {
      document.body.style.filter = "brightness(0.7)";
      estado.innerHTML = "🟡 Acercándose...";
      basura.style.opacity = 1;
    }
    else {
      document.body.style.filter = "brightness(0.4)";
      estado.innerHTML = "🚨 ¡Recolectando!";

      // SOLO desaparece cuando ya llegó
      if (!recogido) {
        basura.style.opacity = 0;
        sonido.play();
        recogido = true;
      }
    }

  })
  .catch(err => console.log(err));
}

setInterval(actualizar, 700);

</script>

</body>
</html>
